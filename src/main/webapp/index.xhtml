<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<link rel="stylesheet" type="text/css"
		href="#{request.contextPath}/CSS/estilos.css" />
	<title>Aspirante UD</title>
	<style>
.error {
	color: red;
	font-size: 0.85em;
}
</style>
</h:head>
<h:body>
	<h:form>
		<h2>Datos del Aspirante</h2>

		<!-- Identificacion numerica entonces el required true es para que sea obligatorio, 
		el validatorMsg y el validateRegex son para verificar que sean solo numeros en 5 y 15 -->

		<h:outputLabel for="id_p" value="No. Identificación:" />
		<h:inputText id="id_p" value="#{asp.dto.id_p}" required="true"
			requiredMessage="El número de identificación es obligatorio."
			converterMessage="La identificación solo debe contener números.">
		</h:inputText>
		<h:message for="id_p" styleClass="error" />
		<br />
		<br />

		<h:outputLabel for="nombres" value="Nombres:" />
		<h:inputText id="nombres" value="#{asp.dto.nombres}" required="true"
			requiredMessage="El nombre es obligatorio."
			validatorMessage="El nombre solo puede tener letras y minimo 2 letras.">
			<f:validateRegex pattern="^[^\d]+$" />
			<f:validateLength minimum="2" maximum="50" />
		</h:inputText>
		<h:message for="nombres" styleClass="error" />
		<br />
		<br />

		<h:outputLabel for="apellidos" value="Apellidos:" />
		<h:inputText id="apellidos" value="#{asp.dto.apellidos}"
			required="true" requiredMessage="Los apellidos son obligatorios."
			validatorMessage="Los apellidos solo puede tener letras y minimo 2 letras.">
			<f:validateRegex pattern="^[^\d]+$" />
			<f:validateLength minimum="2" maximum="50" />
		</h:inputText>
		<h:message for="apellidos" styleClass="error" />
		<br />
		<br />

		<h:outputLabel for="telefono" value="Teléfono:" />
		<h:inputText id="telefono" value="#{asp.dto.telefono}" required="true"
			requiredMessage="El teléfono es obligatorio."
			validatorMessage="El teléfono debe tener entre 7 y 10 dígitos.">
			<f:validateLength minimum="7" maximum="10" />
		</h:inputText>
		<h:message for="telefono" styleClass="error" />
		<br />
		<br />

		<h:outputLabel for="correo" value="Correo:" />
		<h:inputText id="correo" value="#{asp.dto.correo}" required="true"
			requiredMessage="El correo es obligatorio."
			validatorMessage="Ingrese un correo electrónico válido.">
			<f:validateRegex pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$" />
		</h:inputText>
		<h:message for="correo" styleClass="error" />
		<br />
		<br />

		<h:outputLabel for="pro_aca" value="Programa Academico: " />
		<h:selectOneMenu id="pro_aca" value="#{asp.dto.pro_acad.cod}"
			required="true"
			requiredMessage="Debe seleccionar un programa académico.">
			<f:selectItem itemValue="-1" itemLabel="-- seleccione --"
				noSelectionOption="true" />
			<f:selectItems value="#{asp.listaPa}" var="p"
				itemValue="#{asp.listaPa.indexOf(p)}" itemLabel="#{p.nombre_prog}" />
		</h:selectOneMenu>
		<h:message for="pro_aca" styleClass="error" />
		<br />
		<br />

		<h:commandButton value="Registrar" action="#{asp.registrar}">
			<f:ajax execute="@form" render="@form" />
		</h:commandButton>
		<br />
		<br />

		<!-- Todo lo demás queda exactamente igual -->
		<h:panelGroup rendered="#{!asp.listaAS.isEmpty()}">
			<h3>Aspirantes registrados</h3>
			<h:dataTable value="#{asp.listaAS}" var="aspirante" border="1"
				style="width:80%">
				<h:column>
					<f:facet name="header">N°.</f:facet>
					<h:outputText value="#{asp.listaAS.indexOf(aspirante) + 1}" />
				</h:column>
				<h:column>
					<f:facet name="header">Fecha Registro </f:facet>
					<h:outputText value="#{aspirante.fecha_reg}" />
				</h:column>
				<h:column>
					<f:facet name="header">Nombres </f:facet>
					<h:outputText value="#{aspirante.nombres}" />
				</h:column>
				<h:column>
					<f:facet name="header">Apellidos </f:facet>
					<h:outputText value="#{aspirante.apellidos}" />
				</h:column>
				<h:column>
					<f:facet name="header">Teléfono</f:facet>
					<h:outputText value="#{aspirante.telefono}" />
				</h:column>
				<h:column>
					<f:facet name="header">Correo </f:facet>
					<h:outputText value="#{aspirante.correo}" />
				</h:column>
			</h:dataTable>
		</h:panelGroup>

		<a href="vistaAdmin.xhtml">Vista de administrador</a>
	</h:form>

	<footer> <br />
	<br />
	<br />
	<br />
	<h4>Cristian Camilo Torres Huertas cctorresh@udistrital.edu.co taller programacion avanzada-
		2026 - Programación</h4>
	</footer>
</h:body>
</html>
